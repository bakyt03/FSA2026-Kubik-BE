name: fsa-hexagonal-architecture

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: fsa
    volumes:
      - fsa_db_disk:/var/lib/postgresql/data

  my-keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_LOG_LEVEL: info
    command: ["start-dev"]
    ports:
      - "8081:8080"
    networks:
      - fsa-network

volumes:
  fsa_db_disk:
    driver: local

networks:
  fsa-network:
    driver: bridge
